name: cfc_archive
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2

  firebase_core: ^4.2.1
  firebase_storage: ^13.0.4
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1


dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/kits/
    - assets/legends/
    - assets/icon/icon.png
    - assets/trophies/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
